name: Generate Weekly Tech News Blog Post

on:
  schedule:
    # Runs every Friday at 9:00 AM UTC
    - cron: '0 9 * * 5'
  
  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate blog post
        run: node scripts/generate-post.js
        
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Tech Weekly Bot"
          
          # Check if there are changes
          if git diff --quiet; then
            echo "No changes detected, skipping commit."
          else
            git add -A
            git commit -m "feat: Add weekly tech news blog post for $(date -u +%Y-W%V)"
            git push
          fi
